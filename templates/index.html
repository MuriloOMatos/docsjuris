<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girardi & Moraes Advogados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    .hero-section {
      background: linear-gradient(135deg, #0d0d0e 0%, #0a58ca 100%);
      color: white;
      padding: 3rem 0;
      margin-bottom: 2rem;
      border-radius: 0 0 2.5px 2.5px;
    }
    
    .module-card {
      transition: transform 0.3s, box-shadow 0.3s;
      height: 100%;
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .module-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }
    
    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #0d6efd;
    }
  </style>
</head>
<body>
  <!-- Cabeçalho -->
  <header class="hero-section">
    <div class="container text-center">
      <h1 class="display-4 fw-bold" style="color: white;">Girardi & Moraes Advogados</h1>
    </div>
  </header>

  <!-- Conteúdo Principal -->
  <main class="container my-5">
    <div class="row g-4">
      <!-- Módulo 1: COMERCIAL -->
      <div class="col-md-6 col-lg-3">
        <div class="card module-card text-center p-4">
          <div class="card-body">
            <i class="bi bi-file-earmark-text-fill card-icon"></i>
            <h5 class="card-title">Comercial</h5>
            <p class="card-text"></p>
            <a href="/documentos" class="btn btn-primary mt-3">Acessar</a>
          </div>
        </div>
      </div>
      
      <!-- Módulo 2: Petições -->
      <div class="col-md-6 col-lg-3">
        <div class="card module-card text-center p-4">
          <div class="card-body">
            <i class="bi bi-journal-text card-icon"></i>
            <h5 class="card-title">Petições</h5>
            <p class="card-text"></p>
            <a href="/peticoes" class="btn btn-primary mt-3">Acessar</a>
          </div>
        </div>
      </div>
      
      <!-- Módulo 3: Controle Prazos Judiciais -->
      <div class="col-md-6 col-lg-3">
        <div class="card module-card text-center p-4">
          <div class="card-body">
            <i class="bi bi-folder-fill card-icon"></i>
            <h5 class="card-title">Controle Prazos Judiciais</h5>
            <p class="card-text"></p>
            <a href="/prazos" class="btn btn-primary mt-3">Acessar</a>
          </div>
        </div>
      </div>
      
      <!-- Módulo 4: Criar Base -->
      <div class="col-md-6 col-lg-3">
        <div class="card module-card text-center p-4">
          <div class="card-body">
            <i class="bi bi-database-fill card-icon"></i>
            <h5 class="card-title">Administração</h5>
            <p class="card-text"></p>
            <a href="/base" class="btn btn-primary mt-3">Acessar</a>
          </div>
        </div>
      </div>
    </div>
  </main>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
