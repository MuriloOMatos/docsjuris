<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gerador de Petições</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      min-height: 100vh;
    }
    .card {
      border: none;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }
    .bacen-info {
      background-color: #e3f2fd;
      border-radius: 5px;
      padding: 15px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="row g-4 w-100" style="max-width: 600px;">
      <div class="col-12">
        <div class="card">
          <div class="card-header bg-primary text-white">
            <h2 class="h4 mb-0"><i class="bi bi-pencil-square me-2"></i>Dados da Petição</h2>
          </div>
          <div class="card-body">
            <div class="bacen-info">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <h6 class="mb-0"><i class="bi bi-bank me-2"></i>Taxa Média BACEN</h6>
                  <small class="text-muted">Atualizada em: {% if data_atualizacao %}{{ data_atualizacao }}{% else %}N/A{% endif %}</small>
                </div>
                <span class="badge bg-primary fs-6">{% if taxa_bacen %}{{ "%.2f"|format(taxa_bacen) }}%{% else %}N/A{% endif %}</span>
              </div>
            </div>

            <form action="/gerar-peticao" method="post" novalidate>
              <!-- Seleção de Modelo -->
              <div class="mb-3">
                <label for="modelo_peticao" class="form-label">Número de Empréstimos:</label>
                <select class="form-select" id="modelo_peticao" name="modelo_peticao" required>
                  <option value="" selected disabled>Selecione...</option>
                  <option value="1">1 Empréstimo</option>
                  <option value="2">2 Empréstimos</option>
                  <option value="3">3 Empréstimos</option>
                </select>
                <div class="invalid-feedback">Selecione o número de empréstimos</div>
              </div>

              <!-- Dados Gerais -->
              <div class="mb-3">
                <label for="renda_mensal" class="form-label">Renda Mensal Líquida</label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" step="0.01" min="0" class="form-control" 
                         id="renda_mensal" name="renda_mensal" required>
                </div>
                <div class="invalid-feedback">Informe sua renda mensal</div>
              </div>

              <!-- Campos Dinâmicos para Empréstimos -->
              <div id="loan_fields"></div>

              <!-- Parcela Pessoal -->
              <div class="mb-3">
                <label for="parcela_pessoal" class="form-label">Parcela Pessoal</label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" step="0.01" min="0" class="form-control" 
                         id="parcela_pessoal" name="parcela_pessoal" required>
                </div>
                <div class="invalid-feedback">Informe o valor da parcela pessoal</div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-3">
                <i class="bi bi-magic me-2"></i>Gerar Petição
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('modelo_peticao').addEventListener('change', function() {
      const numLoans = parseInt(this.value);
      const container = document.getElementById('loan_fields');
      container.innerHTML = '';

      for(let i = 1; i <= numLoans; i++) {
        const loanIndex = i - 1;
        const loanCard = document.createElement('div');
        loanCard.className = 'card mb-3';
        loanCard.innerHTML = `
          <div class="card-header bg-secondary text-white">
            <h5 class="mb-0">Empréstimo ${i}</h5>
          </div>
          <div class="card-body">
            <!-- Data do Empréstimo -->
            <div class="mb-3">
              <label class="form-label">Data do Empréstimo</label>
              <input type="date" class="form-control" 
                     name="emprestimos[${loanIndex}][data]" required>
            </div>

            <!-- Valor Financiado -->
            <div class="mb-3">
              <label class="form-label">Valor Financiado</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" step="0.01" min="0" class="form-control" 
                       name="emprestimos[${loanIndex}][valor]" required>
              </div>
            </div>

            <!-- Parcela Consignada -->
            <div class="mb-3">
              <label class="form-label">Parcela Consignada</label>
              <div class="input-group">
                <span class="input-group-text">R$</span>
                <input type="number" step="0.01" min="0" class="form-control" 
                       name="emprestimos[${loanIndex}][parcela_consignada]" required>
              </div>
            </div>

            <!-- Número de Parcelas -->
            <div class="mb-3">
              <label class="form-label">Número de Parcelas</label>
              <input type="number" min="1" class="form-control" 
                     name="emprestimos[${loanIndex}][parcelas]" required>
            </div>

            <!-- Taxa de Juros -->
            <div class="mb-3">
              <label class="form-label">Taxa de Juros Mensal</label>
              <div class="input-group">
                <input type="number" step="0.01" min="0" class="form-control" 
                       name="emprestimos[${loanIndex}][taxa]" required>
                <span class="input-group-text">%</span>
              </div>
            </div>
          </div>
        `;
        container.appendChild(loanCard);
      }
    });
  </script>
</body>
</html>
