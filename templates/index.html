<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gerador de Petições</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      min-height: 100vh;
    }
    .card {
      border: none;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }
    .card-body {
      padding: 1.5rem;
    }
    /* Remove o contorno vermelho dos campos de taxa de juros em qualquer situação */
    input[id^="taxa_"] {
      border-color: #ced4da !important; /* Cor padrão do Bootstrap */
      box-shadow: none !important; /* Remove sombra de foco */
    }
    input[id^="taxa_"]:focus {
      border-color: #86b7fe !important; /* Cor padrão de foco do Bootstrap */
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important; /* Sombra de foco padrão */
    }
  </style>
</head>
<body>
  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="row g-4 w-100" style="max-width: 600px;">
      <div class="col-12">
        <div class="card">
          <div class="card-header bg-primary text-white">
            <h2 class="h4 mb-0"><i class="bi bi-pencil-square me-2"></i>Dados da Petição</h2>
          </div>
          <div class="card-body">
            <form action="/gerar-peticao" method="post" role="form" novalidate>
              <!-- Seleção de Modelo -->
              <div class="mb-3">
                <label for="modelo_peticao" class="form-label">Número de Empréstimos:</label>
                <select class="form-select" id="modelo_peticao" name="modelo_peticao" required aria-label="Selecione o número de empréstimos" aria-required="true">
                  <option value="" selected disabled>Selecione um modelo...</option>
                  <option value="1">1 Empréstimo</option>
                  <option value="2">2 Empréstimos</option>
                  <option value="3">3 Empréstimos</option>
                </select>
                <div class="invalid-feedback">Selecione um modelo de petição.</div>
              </div>

              <!-- Dados Gerais -->
              <div class="mb-3">
                <label for="renda_mensal" class="form-label">Renda Mensal Líquida</label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" step="0.01" min="0" class="form-control" id="renda_mensal" name="renda_mensal" placeholder="Ex: 3500,00" required aria-describedby="renda_mensalHelp" aria-required="true">
                </div>
                <div id="renda_mensalHelp" class="invalid-feedback">Informe um valor válido.</div>
              </div>

              <!-- Container para os campos de cada empréstimo -->
              <div id="loan_fields"></div>

              <!-- Parcela Pessoal -->
              <div class="mb-3">
                <label for="parcela_pessoal" class="form-label">Parcela Pessoal</label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" step="0.01" min="0" class="form-control" id="parcela_pessoal" name="parcela_pessoal" placeholder="Ex: 500,00" required aria-describedby="parcela_pessoalHelp" aria-required="true">
                </div>
                <div id="parcela_pessoalHelp" class="invalid-feedback">Informe um valor válido.</div>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-3" aria-label="Gerar petição automática">
                <i class="bi bi-magic me-2"></i>Gerar Petição Automática
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript Bootstrap 5 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function manageLoanFields() {
      const select = document.getElementById('modelo_peticao');
      const container = document.getElementById('loan_fields');

      select.addEventListener('change', function() {
        const numLoans = parseInt(this.value) || 0;
        container.innerHTML = ''; // Limpa os campos existentes

        for (let i = 0; i < numLoans; i++) {
          const group = document.createElement('div');
          group.className = 'card mb-3';
          group.innerHTML = `
            <div class="card-header bg-secondary text-white">
              <h5 class="mb-0">Empréstimo ${i + 1}</h5>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label for="valor_${i}" class="form-label">Valor Financiado</label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" step="0.01" min="0" class="form-control" id="valor_${i}" 
                         name="emprestimos[${i}][valor]" placeholder="Ex: 1000,00" required aria-describedby="valorHelp_${i}" aria-required="true">
                </div>
                <div id="valorHelp_${i}" class="invalid-feedback">Informe um valor válido.</div>
              </div>
              <div class="mb-3">
                <label for="parcela_${i}" class="form-label">Parcela Consignada</label>
                <div class="input-group">
                  <span class="input-group-text">R$</span>
                  <input type="number" step="0.01" min="0" class="form-control" id="parcela_${i}" 
                         name="emprestimos[${i}][parcela_consignada]" placeholder="Ex: 300,00" required aria-describedby="parcelaHelp_${i}" aria-required="true">
                </div>
                <div id="parcelaHelp_${i}" class="invalid-feedback">Informe um valor válido.</div>
              </div>
              <div class="mb-3">
                <label for="data_${i}" class="form-label">Data do Empréstimo</label>
                <input type="date" class="form-control" id="data_${i}" 
                       name="emprestimos[${i}][data]" required aria-describedby="dataHelp_${i}" aria-required="true">
                <div id="dataHelp_${i}" class="invalid-feedback">Informe a data do empréstimo.</div>
              </div>
              <div class="mb-3">
                <label for="parcelas_${i}" class="form-label">Número de Parcelas</label>
                <input type="number" min="1" class="form-control" id="parcelas_${i}" 
                       name="emprestimos[${i}][parcelas]" placeholder="Ex: 12" required aria-describedby="parcelasHelp_${i}" aria-required="true">
                <div id="parcelasHelp_${i}" class="invalid-feedback">Informe o número de parcelas.</div>
              </div>
              <div class="mb-3">
                <label for="taxa_${i}" class="form-label">Taxa de Juros Contratada</label>
                <div class="input-group">
                  <input type="number" step="0.01" min="0" max="100" class="form-control" id="taxa_${i}" 
                         name="emprestimos[${i}][taxa]" placeholder="Ex: 2,5" required aria-describedby="taxaHelp_${i}" aria-required="true">
                  <span class="input-group-text">%</span>
                </div>
                <div id="taxaHelp_${i}" class="invalid-feedback">Informe uma taxa entre 0 e 100%.</div>
              </div>
            </div>
          `;
          container.appendChild(group);
        }
      });

      // Validação em tempo real
      document.addEventListener('input', function(e) {
        const input = e.target;
        if (input.type === 'number') {
          // Ignora a validação visual para campos de taxa de juros
          if (input.id.startsWith('taxa_')) {
            return; // Não aplica is-invalid aos campos de taxa
          }
          if (input.value < input.min || (input.max && input.value > input.max)) {
            input.classList.add('is-invalid');
          } else {
            input.classList.remove('is-invalid');
          }
        }
      });
    }
    manageLoanFields();
  </script>
</body>
</html>
