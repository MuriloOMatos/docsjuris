<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girardi & Moraes Advogados - Gerador de Documentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root {
      --primary-color: #0d6efd;
      --secondary-color: #6c757d;
      --dark-color: #0d0d0e;
      --light-color: #f8f9fa;
    }
    
    body {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
    }
    
    .sidebar {
      background: linear-gradient(135deg, var(--dark-color) 0%, var(--primary-color) 100%);
      color: white;
      min-height: 100vh;
      position: fixed;
      width: 220px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    
    .main-content {
      margin-left: 220px;
      padding: 20px;
      min-height: 100vh;
    }
    
    .logo-container {
      padding: 1.5rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    
    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: white;
    }
    
    .nav-link {
      color: rgba(255,255,255,0.8);
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      margin-bottom: 0.25rem;
      transition: all 0.3s;
    }
    
    .nav-link:hover, .nav-link.active {
      color: white;
      background-color: rgba(255,255,255,0.15);
    }
    
    .nav-link i {
      width: 20px;
      text-align: center;
      margin-right: 10px;
    }
    
    .card {
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }
    
    .card-header {
      background: linear-gradient(135deg, var(--primary-color) 0%, #0a58ca 100%);
      color: white;
      border-radius: 10px 10px 0 0 !important;
    }
    
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: relative;
        min-height: auto;
      }
      
      .main-content {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo-container">
      <div class="logo">G&M</div>
      <small class="text-white-50">Advocacia</small>
    </div>
    
    <div class="d-flex flex-column p-3">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a href="/" class="nav-link d-flex align-items-center">
            <i class="bi bi-house-door"></i> Página Inicial
          </a>
        </li>
        <li class="nav-item">
          <a href="/documentos" class="nav-link d-flex align-items-center active">
            <i class="bi bi-file-earmark-text"></i> Gerar Documentos
          </a>
        </li>
        <li class="nav-item">
          <a href="/peticoes" class="nav-link d-flex align-items-center">
            <i class="bi bi-journal-text"></i> Petições
          </a>
        </li>
        <li class="nav-item">
          <a href="/prazos" class="nav-link d-flex align-items-center">
            <i class="bi bi-folder"></i> Controle de Prazos
          </a>
        </li>
        <li class="nav-item">
          <a href="/base" class="nav-link d-flex align-items-center">
            <i class="bi bi-database"></i> Administração
          </a>
        </li>
        <li class="nav-item mt-4">
          <a href="/login" class="nav-link d-flex align-items-center">
            <i class="bi bi-box-arrow-right"></i> Sair
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="container-fluid">
      <div class="card">
        <div class="card-header">
          <h4 class="mb-0"><i class="bi bi-file-earmark-text me-2"></i>Gerador de Documentos</h4>
        </div>
        <div class="card-body">
          <!-- Conteúdo do Gerador de Documentos -->
          <form id="form-documentos" action="/documentos/gerar" method="post">
            
            <!-- Seleção dos documentos -->
            <div class="mb-4">
              <label class="form-label fw-bold">Selecione os documentos que deseja gerar:</label>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="documentos" value="declaracao_ir" id="isencao_ir">
                <label class="form-check-label" for="isencao_ir">Isenção de IR</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="documentos" value="declaracao_procuradores" id="foro">
                <label class="form-check-label" for="foro">Opção de Foro</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="documentos" value="declaracao_hiposuficencia" id="hipossuficiencia">
                <label class="form-check-label" for="hipossuficiencia">Hipossuficiência</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="documentos" value="procuracao" id="procuracao">
                <label class="form-check-label" for="procuracao">Procuração</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="documentos" value="declaracao_contrato_digital" id="contratacao_digital">
                <label class="form-check-label" for="contratacao_digital">Contratação Digital</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="documentos" value="declaracao_residencia" id="declaracao_residencia">
                <label class="form-check-label" for="declaracao_residencia">Declaração de Residência</label>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="documentos" value="contratos_honorarios" id="contrato_revisional">
                <label class="form-check-label" for="contrato_revisional">Contrato Revisional</label>
              </div>
            </div>

            <!-- Dados para preenchimento -->
            <div class="row g-3">
              <div class="col-md-6">
                <label for="nome" class="form-label">Nome Completo</label>
                <input type="text" class="form-control" id="nome" name="nome" required>
              </div>
              <div class="col-md-6">
                <label for="cpf" class="form-label">CPF</label>
                <input type="text" class="form-control" id="cpf" name="CPF" required>
              </div>
              <div class="col-md-6">
                <label for="cidadania" class="form-label">Nacionalidade</label>
                <input type="text" class="form-control" id="cidadania" name="cidadania" value="brasileiro" required>
              </div>
              <div class="col-md-6">
                  <label for="estado_civil" class="form-label">Estado Civil</label>
                  <select class="form-control" id="estado_civil" name="estado_civil" required>
                    <option value="">Selecione...</option>
                    <option value="solteiro">Solteiro(a)</option>
                    <option value="casado">Casado(a)</option>
                    <option value="separado judicialmente">Separado(a) judicialmente</option>
                    <option value="divorciado">Divorciado(a)</option>
                    <option value="viúvo">Viúvo(a)</option>
                    <option value="em união estável">Em união estável</option>
                  </select>
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" placeholder="Opcional">
                <input type="hidden" id="email_final" name="email">
              </div>
              <div class="col-md-3">
                <label for="cep" class="form-label">CEP</label>
                <input type="text" class="form-control" id="cep" name="CEP" required>
              </div>
              <div class="col-md-6">
                <label for="rua" class="form-label">Rua</label>
                <input type="text" class="form-control" id="rua" name="rua" required>
              </div>
              <div class="col-md-3">
                <label for="numero" class="form-label">Número</label>
                <input type="text" class="form-control" id="numero" name="numero" required>
              </div>
              <div class="col-md-6">
                <label for="complemento1" class="form-label">Complemento 1</label>
                <input type="text" class="form-control" id="complemento1" name="complemento1" value="Casa" required>
              </div>
              <div class="col-md-6">
                <label for="bairro" class="form-label">Bairro</label>
                <input type="text" class="form-control" id="bairro" name="bairro" required>
              </div>
              <div class="col-md-4">
                <label for="cidade" class="form-label">Cidade</label>
                <input type="text" class="form-control" id="cidade" name="cidade" required>
              </div>
              <div class="col-md-2">
                <label for="estado" class="form-label">UF</label>
                <input type="text" class="form-control" id="estado" name="estado" maxlength="2" required>
              </div>

              <!-- Campo Banco com CNPJ - ATUALIZADO COM TODOS OS BANCOS -->
              <div class="col-md-4">
                <label for="banco" class="form-label">Banco</label>
                <select name="banco" id="banco" class="form-control" required>
                  <option value="">Selecione um banco</option>
                  <option value="banco_brasil" data-cnpj="00.000.000/0001-00">01 - BANCO DO BRASIL</option>
                  <option value="caixa" data-cnpj="00.000.000/0001-91">02 - CAIXA ECONÔMICA FEDERAL</option>
                  <option value="bradesco" data-cnpj="60.746.948/0001-12">03 - BANCO BRADESCO S.A.</option>
                  <option value="itau" data-cnpj="60.872.504/0001-23">04 - BANCO ITAÚ S.A.</option>
                  <option value="santander" data-cnpj="90.400.888/0001-42">05 - BANCO SANTANDER</option>
                  <option value="sicoob" data-cnpj="05.993.936/0001-66">06 - SICOOB CREDIRIODÓSUL</option>
                  <option value="sicredi" data-cnpj="97.957.817/0001-14">07 - SICREDI</option>
                  <option value="mercantil" data-cnpj="17.184.037/0001-10">08 - BANCO MERCANTIL DO BRASIL S.A.</option>
                  <option value="bmg" data-cnpj="61.186.680/0001-74">09 - BANCO BMG S.A.</option>
                  <option value="crefisa" data-cnpj="61.033.106/0001-86">10 - BANCO CREFISA S.A.</option>
                  <option value="agbank" data-cnpj="10.664.513/0001-50">11 - BANCO AGBANK S.A.</option>
                  <option value="crefaz" data-cnpj="18.188.384/0001-83">12 - CREFAZ SOCIEDADE DE CRÉDITO</option>
                </select>
              </div>

              <div class="col-md-4">
                <label for="cnpj_banco" class="form-label">CNPJ do Banco</label>
                <input type="text" class="form-control" id="cnpj_banco" name="cnpj_banco" placeholder="Selecione um banco" readonly>
              </div>

              <div class="col-md-4">
                <label for="data" class="form-label">Data</label>
                <input type="text" class="form-control" id="data" name="data_extenso" required>
              </div>
            </div>

            <div class="mt-4 d-grid gap-2">
              <button type="submit" class="btn btn-primary">Gerar Documento(s)</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Formatar nome para maiúsculas em tempo real
    document.getElementById('nome').addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });

    // Validação para garantir que pelo menos um documento seja selecionado
    document.getElementById('form-documentos').addEventListener('submit', function(event) {
      // Forçar nome para maiúsculas (caso o usuário tenha desativado JavaScript)
      document.getElementById('nome').value = document.getElementById('nome').value.toUpperCase();
      
      // Processa o email primeiro
      const emailInput = document.getElementById('email');
      const emailFinal = document.getElementById('email_final');
      const emailValue = emailInput.value.trim();
      
      if (emailValue === '') {
        emailFinal.value = 'sem endereço eletronico';
      } else {
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
          alert('Por favor, insira um e-mail válido ou deixe em branco');
          event.preventDefault();
          return;
        }
        emailFinal.value = 'com endereço eletrônico: ' + emailValue;
      }

      // Valida seleção de documentos
      const checkboxes = document.querySelectorAll('input[name="documentos"]:checked');
      if (checkboxes.length === 0) {
        event.preventDefault();
        alert('Por favor, selecione pelo menos um documento.');
        return;
      }

      // Valida CPF
      const cpf = document.getElementById('cpf').value;
      if (!validarCPF(cpf)) {
        alert('CPF inválido. Corrija antes de enviar.');
        event.preventDefault();
        return;
      }
    });

    // Busca de CEP
    document.getElementById('cep').addEventListener('blur', function() {
      let cep = this.value.replace(/\D/g, '');
      if (cep.length === 8) {
        fetch(`https://viacep.com.br/ws/${cep}/json/`)
          .then(response => response.json())
          .then(data => {
            if (!data.erro) {
              document.getElementById('rua').value = data.logradouro || '';
              document.getElementById('bairro').value = data.bairro || '';
              document.getElementById('cidade').value = data.localidade || '';
              document.getElementById('estado').value = data.uf || '';
            } else {
              alert('CEP não encontrado.');
            }
          })
          .catch(() => alert('Erro ao buscar o CEP.'));
      } else {
        alert('CEP inválido.');
      }
    });

    // Preencher data automática por extenso
    document.addEventListener('DOMContentLoaded', function() {
      const hoje = new Date();
      const opcoes = { day: '2-digit', month: 'long', year: 'numeric' };
      const dataFormatada = hoje.toLocaleDateString('pt-BR', opcoes);
      const [dia, mes, ano] = dataFormatada.split(' de ');
      document.getElementById('data').value = `${dia} de ${mes.toLowerCase()} de ${ano}`;
    });

    // Função para validar CPF
    function validarCPF(cpf) {
      cpf = cpf.replace(/[^\d]/g, '');
      if (cpf.length !== 11) return false;
      if (/^(\d)\1+$/.test(cpf)) return false;
      let soma = 0;
      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf.charAt(i)) * (10 - i);
      }
      let resto = 11 - (soma % 11);
      let digito1 = resto >= 10 ? 0 : resto;
      if (digito1 !== parseInt(cpf.charAt(9))) return false;
      soma = 0;
      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf.charAt(i)) * (11 - i);
      }
      resto = 11 - (soma % 11);
      let digito2 = resto >= 10 ? 0 : resto;
      return digito2 === parseInt(cpf.charAt(10));
    }

    // Máscara para o CPF
    document.getElementById('cpf').addEventListener('input', function() {
      let value = this.value.replace(/\D/g, '');
      if (value.length > 11) value = value.slice(0, 11);
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
      value = value.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
      this.value = value;
    });

    // Preencher automaticamente o CNPJ do banco selecionado
    document.getElementById('banco').addEventListener('change', function() {
      let cnpjInput = document.getElementById('cnpj_banco');
      let selectedOption = this.options[this.selectedIndex];
      let cnpj = selectedOption.getAttribute('data-cnpj');

      if (cnpj) {
        cnpjInput.value = cnpj;
      } else {
        cnpjInput.value = "";
        cnpjInput.placeholder = "Selecione um banco";
      }
    });
  </script>
</body>
</html>
