<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Documentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5 mb-5">
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h4>Gerador de Documentos</h4>
    </div>
    <div class="card-body">
      <form action="/documentos/gerar" method="post">
        <!-- Seleção dos documentos -->
        <div class="mb-4">
          <label class="form-label fw-bold">Selecione os documentos que deseja gerar:</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="documentos" value="isenção_ir" id="isenção_ir">
            <label class="form-check-label" for="isenção_ir">Isenção de IR</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="documentos" value="foro" id="foro">
            <label class="form-check-label" for="foro">Opção de Foro</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="documentos" value="hipossuficiencia" id="hipossuficiencia">
            <label class="form-check-label" for="hipossuficiencia">Hipossuficiência</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="documentos" value="procuracao" id="procuracao">
            <label class="form-check-label" for="procuracao">Procuração</label>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="documentos" value="contrato_revisional" id="contrato_revisional">
            <label class="form-check-label" for="contrato_revisional">Contrato Revisional</label>
          </div>
        </div>

        <!-- Dados para preenchimento dos documentos -->
        <div class="row g-3">
          <div class="col-md-6">
            <label for="Nome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="Nome" name="Nome" required>
          </div>
          <div class="col-md-6">
            <label for="CPF" class="form-label">CPF</label>
            <input type="text" class="form-control" id="CPF" name="CPF" required>
          </div>
          <div class="col-md-6">
            <label for="Cidadania" class="form-label">Nacionalidade</label>
            <input type="text" class="form-control" id="Cidadania" name="Cidadania" required>
          </div>
          <div class="col-md-6">
            <label for="Estado Civil" class="form-label">Estado Civil</label>
            <input type="text" class="form-control" id="Estado Civil" name="Estado Civil" required>
          </div>
          <div class="col-md-6">
            <label for="Emprego" class="form-label">Profissão</label>
            <input type="text" class="form-control" id="Emprego" name="Emprego" required>
          </div>
          <div class="col-md-6">
            <label for="EMAIL" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="EMAIL" name="EMAIL" required>
          </div>
          <div class="col-md-6">
            <label for="Rua" class="form-label">Rua</label>
            <input type="text" class="form-control" id="Rua" name="Rua" required>
          </div>
          <div class="col-md-3">
            <label for="Numero" class="form-label">Número</label>
            <input type="text" class="form-control" id="Numero" name="Numero" required>
          </div>
          <div class="col-md-3">
            <label for="CEP" class="form-label">CEP</label>
            <input type="text" class="form-control" id="CEP" name="CEP" required>
          </div>
          <div class="col-md-6">
            <label for="complemento1" class="form-label">Complemento 1</label>
            <input type="text" class="form-control" id="complemento1" name="complemento1">
          </div>
          <div class="col-md-6">
            <label for="complemento2" class="form-label">Complemento 2</label>
            <input type="text" class="form-control" id="complemento2" name="complemento2">
          </div>
          <div class="col-md-6">
            <label for="bairro" class="form-label">Bairro</label>
            <input type="text" class="form-control" id="bairro" name="bairro" required>
          </div>
          <div class="col-md-4">
            <label for="cidade" class="form-label">Cidade</label>
            <input type="text" class="form-control" id="cidade" name="cidade" required>
          </div>
          <div class="col-md-2">
            <label for="ESTADO" class="form-label">UF</label>
            <input type="text" class="form-control" id="ESTADO" name="ESTADO" maxlength="2" required>
          </div>
          <div class="col-md-4">
            <label for="Estado" class="form-label">Banco</label>
            <input type="text" class="form-control" id="Estado" name="Estado" required>
          </div>
          <div class="col-md-4">
            <label for="data" class="form-label">Data</label>
            <input type="text" class="form-control" id="data" name="data" placeholder="DD/MM/AAAA" required>
          </div>
        </div>

        <div class="mt-4">
          <button type="submit" class="btn btn-primary w-100">Gerar Documento(s)</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
